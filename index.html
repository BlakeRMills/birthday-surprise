<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punch-A-Bunch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Ranchers&display=swap" rel="stylesheet">
<style>
  /* ===== THEME ROLES (default = Old Glory) ===== */
  /* Palette: 274265 / 7CC0CD / E4DAD0 / B02D27 / E1E1E1 / 1C2B4A */
  /* coins = light teal-blue, distinct from the navy frame + red accent */
  :root{
    --bg:#e8e9ec; --card:#ffffff; --line:#d4d7dd; --ink:#1c2b4a; --muted:#5c6880;
    --glow-a: rgba(176,45,39,0.12); --glow-b: rgba(39,66,101,0.12); --glow-c: rgba(124,192,205,0.20);
    --frame:#274265; --frame-deep:#1c2b4a;
    --coin:#7cc0cd; --coin-bright:#a9dbe4; --coin-deep:#4d9aa9; --coin-ink:#1c2b4a;
    --accent:#b02d27; --accent-deep:#8f1f1a;
    --logo-1:#b02d27; --logo-2:#274265;
    --dot:#b02d27; --dot-deep:#8f1f1a; --dot-ink:#e4dad0;
    --pill-a:#274265; --pill-b:#b02d27;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0; min-height:100%;
    font-family:'Fredoka', system-ui, sans-serif;
    color:var(--ink);
    background:
      radial-gradient(900px 500px at 12% 0%, var(--glow-a), transparent 55%),
      radial-gradient(900px 500px at 92% 4%, var(--glow-b), transparent 55%),
      radial-gradient(1000px 600px at 50% 110%, var(--glow-c), transparent 60%),
      var(--bg);
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
    transition: background-color .35s ease;
  }

  .wrap{
    max-width:1120px;
    margin:0 auto;
    padding: 22px clamp(16px, 3vw, 34px) 26px;
    text-align:center;
  }

  /* ===== TOP: centered logo, text, scoreboard ===== */
  .topbar{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    margin-bottom:18px;
  }
  .logo{
    margin:0;
    font-family:'Ranchers', cursive;
    font-weight:400;
    line-height:1;
    letter-spacing:0.02em;
    font-size: clamp(3.2rem, 9vw, 6rem);
    display:flex;
    align-items:center;
    gap: clamp(10px, 1.6vw, 20px);
  }
  .logo .red{ color:var(--logo-1); }
  .logo .green{ color:var(--logo-2); }
  .logo .dot{
    width: clamp(60px, 8vw, 92px);
    height: clamp(60px, 8vw, 92px);
    display:flex; align-items:center; justify-content:center;
    font-size: clamp(1.4rem, 3.6vw, 2.2rem);
    color:#ffffff;
    background:radial-gradient(circle at 42% 36%, var(--dot), var(--dot-deep));
    clip-path: polygon(
      50% 0%, 57.76% 21.02%, 75% 6.7%, 71.21% 28.79%, 93.3% 25%, 78.98% 42.24%,
      100% 50%, 78.98% 57.76%, 93.3% 75%, 71.21% 71.21%, 75% 93.3%, 57.76% 78.98%,
      50% 100%, 42.24% 78.98%, 25% 93.3%, 28.79% 71.21%, 6.7% 75%, 21.02% 57.76%,
      0% 50%, 21.02% 42.24%, 6.7% 25%, 28.79% 28.79%, 25% 6.7%, 42.24% 21.02%
    );
  }

  .scoreboard{ display:flex; gap: 18px; }
  .pill{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    background: var(--card);
    border:1px solid var(--line);
    border-radius: 20px;
    padding: 14px 34px;
    min-width: 168px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  }
  .pill .label{
    font-size:.82rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--muted);
    font-weight:600;
  }
  .pill span.value{ font-weight:700; font-size:2.8rem; line-height:1.05; }
  .pill.yellow span.value{ color:var(--pill-a); }
  .pill.red span.value{ color:var(--pill-b); }

  .messages{
    font-size: clamp(1.4rem, 3vw, 2rem);
    color: var(--muted);
    font-weight:600;
    letter-spacing:0;
    min-height:1.4em;
  }
  .messages b{ color:var(--accent); font-weight:700; }

  /* ===== BOARD ===== */
  .board-frame{
    position:relative;
    background: linear-gradient(180deg, var(--frame) 0%, var(--frame-deep) 100%);
    border-radius: 20px;
    padding: clamp(6px, 0.8vw, 10px);   /* thin frame border */
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.3),
      0 20px 40px rgba(0,0,0,0.14);
    max-width: 780px;
    margin: 0 auto;
  }
  .board{
    position:relative;
    background: var(--bg);
    border-radius: 15px;
    padding: clamp(16px, 2vw, 26px);
    display:grid;
    /* fixed coin size — extra width becomes spacing, not bigger coins */
    grid-template-columns: repeat(5, clamp(64px, 7vw, 100px));
    justify-content: space-between;
    row-gap: clamp(16px, 2vw, 26px);
    box-shadow: inset 0 2px 8px rgba(120,100,50,0.12);
  }

  .cell{ perspective: 1000px; aspect-ratio: 1 / 1; }
  .card{
    position:relative;
    width:100%; height:100%;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(.2,.8,.25,1.1);
  }
  .card.flipped{ transform: rotateY(180deg); }

  /* 12-point firework / starburst shape for the coins */
  .face{
    position:absolute; inset:0;
    backface-visibility: hidden;
    display:flex; align-items:center; justify-content:center;
    clip-path: polygon(
      50% 0%, 57.76% 21.02%, 75% 6.7%, 71.21% 28.79%, 93.3% 25%, 78.98% 42.24%,
      100% 50%, 78.98% 57.76%, 93.3% 75%, 71.21% 71.21%, 75% 93.3%, 57.76% 78.98%,
      50% 100%, 42.24% 78.98%, 25% 93.3%, 28.79% 71.21%, 6.7% 75%, 21.02% 57.76%,
      0% 50%, 21.02% 42.24%, 6.7% 25%, 28.79% 28.79%, 25% 6.7%, 42.24% 21.02%
    );
  }

  .front{
    background: radial-gradient(circle at 42% 36%, var(--coin-bright) 0%, var(--coin) 44%, var(--coin-deep) 100%);
    box-shadow:
      inset 0 -6px 12px rgba(0,0,0,0.16),
      inset 0 6px 10px rgba(255,255,255,0.45);
    cursor:pointer;
    user-select:none;
    transition: transform .18s cubic-bezier(.2,.8,.25,1.1), filter .18s ease;
  }
  .front .coin-inner{
    width: 50%;
    height: 50%;
    border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    color:var(--coin-ink);
    font-weight:700;
    font-size: clamp(0.85rem, 2vw, 1.35rem);
    text-shadow: 0 1px 2px rgba(0,0,0,0.35);
    border:1.5px solid rgba(255,255,255,0.45);
    box-shadow: inset 0 -2px 5px rgba(0,0,0,0.18), inset 0 2px 4px rgba(255,255,255,0.4);
    background: radial-gradient(circle at 42% 34%, rgba(255,255,255,0.3), rgba(0,0,0,0.12) 90%);
  }
  .front:hover:not(.disabled){
    transform: scale(1.1) rotate(15deg);
    filter: brightness(1.08);
  }
  .front:active:not(.disabled){ transform: scale(.94); }
  .front.disabled{ cursor:not-allowed; }

  .back{
    background: radial-gradient(circle at 42% 36%, color-mix(in srgb, var(--accent) 78%, #fff) 0%, var(--accent) 52%, var(--accent-deep) 100%);
    box-shadow:
      inset 0 -6px 12px rgba(0,0,0,0.18),
      inset 0 6px 10px rgba(255,255,255,0.25);
    transform: rotateY(180deg);
    color:#fff;
    font-weight:700;
    font-size: clamp(0.42rem, 1.2vw, 0.64rem);
    padding: 18% 14%;
    text-align:center;
    line-height:1.1;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    overflow:hidden;
  }

  /* ===== CONTROLS ===== */
  .controls{ margin-top:18px; }
  #resetBtn{
    background: transparent;
    color:var(--ink);
    border: 1px solid var(--line);
    padding: 9px 22px;
    border-radius: 999px;
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size: .9rem;
    cursor:pointer;
    transition: border-color .15s ease, color .15s ease, background .15s ease;
  }
  #resetBtn:hover{ border-color:var(--frame-deep); color:var(--frame-deep); background:rgba(0,0,0,0.03); }
  #resetBtn:active{ transform: translateY(1px); }

  /* ===== FIREWORKS CANVAS ===== */
  #fireworksCanvas{
    position:fixed; inset:0;
    width:100%; height:100%;
    z-index:18;               /* above the dark backdrop, below the popup */
    pointer-events:none;
  }

  /* ===== DARKENING BACKDROP (grand prize) ===== */
  .backdrop{
    position:fixed; inset:0;
    background: rgba(4,6,20,0);
    z-index:15;
    opacity:0;
    pointer-events:none;
    transition: background .5s ease, opacity .5s ease;
  }
  .backdrop.show{ opacity:1; pointer-events:auto; background: rgba(4,6,20,0.78); }

  /* ===== PRIZE REVEAL ===== */
  @keyframes pop{ 0%{ transform:scale(.55); opacity:0; } 100%{ transform:scale(1); opacity:1; } }
  .prize-banner.reveal-pop h2,
  .prize-banner.reveal-pop #prizeDesc{ animation: pop .5s cubic-bezier(.2,.8,.25,1.3); }
  .prize-banner{
    display:none;
    position: fixed;
    left:50%; top:18%;
    transform: translate(-50%,-24px);
    width:min(640px, 94vw);
    background: var(--card);
    border:1px solid var(--line);
    color: var(--ink);
    padding: 54px 62px 48px;
    border-radius: 28px;
    box-shadow: 0 30px 70px rgba(80,60,20,0.28);
    z-index: 20;
    text-align:center;
    opacity:0;
    transition: transform 0.38s cubic-bezier(.2,.8,.25,1.15), opacity 0.32s ease;
  }
  .prize-banner::before{
    content:"";
    position:absolute; left:50%; top:0;
    width:80px; height:4px;
    transform:translate(-50%,-1px);
    border-radius:0 0 4px 4px;
    background:linear-gradient(90deg, var(--accent), var(--coin), var(--frame));
  }
  .prize-banner.show{ display:block; opacity:1; transform: translate(-50%,0); }
  .prize-banner .kicker{
    font-size:.95rem; letter-spacing:.28em; text-transform:uppercase;
    color:var(--coin-deep); font-weight:700; margin-bottom:14px;
  }
  .prize-banner h2{ margin: 0 0 12px; font-weight:700; font-size: clamp(2.2rem, 6vw, 3.4rem); line-height:1.06; }
  .prize-banner p{ margin:0; font-size: 1.45rem; color:var(--muted); font-weight:400; line-height:1.4; }
  .prize-banner button{
    margin-top: 30px;
    background: linear-gradient(180deg, var(--coin-bright), var(--coin-deep));
    color:var(--coin-ink);
    border:none;
    padding: 15px 44px;
    border-radius: 999px;
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    cursor:pointer;
    font-size: 1.3rem;
    transition: transform .12s ease, filter .12s ease;
  }
  .prize-banner button:hover{ filter:brightness(1.05); }
  .prize-banner button:active{ transform: translateY(2px); }

  @media (max-width:600px){
    .pill{ min-width: 100px; }
  }
</style>
</head>
<body data-theme="oldglory">

<div class="wrap">

  <div class="topbar">
    <h1 class="logo">
      <span class="red">PUNCH</span>
      <span class="dot">A</span>
      <span class="green">BUNCH</span>
    </h1>
    <div class="messages" id="message">Punch a slot and see what you win!</div>
    <div class="scoreboard">
      <div class="pill yellow">
        <span class="label">Punches Left</span>
        <span class="value" id="punchCount">3</span>
      </div>
      <div class="pill red">
        <span class="label">Prizes Won</span>
        <span class="value" id="wonCount">0</span>
      </div>
    </div>
  </div>

  <div class="board-frame">
    <div class="board" id="board"></div>
  </div>

  <div class="controls">
    <button id="resetBtn">Reset Board</button>
  </div>


</div>

<canvas id="fireworksCanvas"></canvas>
<div class="backdrop" id="backdrop"></div>

<div class="prize-banner" id="prizeBanner">
  <div class="kicker" id="prizeKicker">You won</div>
  <h2 id="prizeTitle">PRIZE!</h2>
  <p id="prizeDesc">Placeholder prize copy goes here.</p>
  <button id="prizeBtn">Continue</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.9.2/confetti.browser.min.js"></script>
<script>
/* =========================================================
   PRIZES ARE FIXED, NOT RANDOM.
   No matter which coin she picks, the 1st punch always reveals
   Prize One, the 2nd reveals Prize Two, and the 3rd is the
   GRAND PRIZE (with a "click to reveal" step).

   >>> EDIT THE PLACEHOLDER TEXT BELOW WITH THE REAL PRIZES <<<
   - "title" shows big on the reveal banner + on the flipped coin
   - "desc"  is the smaller line underneath
   ========================================================= */
const PRIZES = [
  // Punch 1
  { title: "a German\nChocolate Cake",   desc: "You won a German Chocolate Cake!" },
  // Punch 2
  { title: "a Moscow Mule",   desc: "You won a Moscow Mule!" },
  // Punch 3 (grand prize — revealed after the 'Click to Reveal' button)
  { title: "4 Tickets to the Price is Right\nLive in Grand Island", desc: "You won 4 Tickets to The Price is Right Live in Grand Island!", grand: true }
];

const NUM_TILES = 25;      // 5x5 board
const NUM_PUNCHES = 3;     // one punch per fixed prize above

let punchesLeft = NUM_PUNCHES;
let wonCount = 0;
let grandPending = false;  // waiting on the "Click to Reveal" tap
let grandPrize = null;
let grandCard = null;      // the coin held back until the reveal

function buildBoard(){
  const board = document.getElementById("board");
  board.innerHTML = "";

  for(let i = 0; i < NUM_TILES; i++){
    const cell = document.createElement("div");
    cell.className = "cell";

    const card = document.createElement("div");
    card.className = "card";
    card.dataset.index = i;

    const front = document.createElement("div");
    front.className = "face front";
    const coinInner = document.createElement("div");
    coinInner.className = "coin-inner";
    coinInner.textContent = "$";
    front.appendChild(coinInner);

    const back = document.createElement("div");
    back.className = "face back";   // filled in when punched

    card.appendChild(front);
    card.appendChild(back);
    cell.appendChild(card);
    board.appendChild(cell);

    front.addEventListener("click", () => punchTile(card, front, back));
  }
}

function updateScoreboard(){
  document.getElementById("punchCount").textContent = punchesLeft;
  document.getElementById("wonCount").textContent = wonCount;
}

function setMessage(html){
  document.getElementById("message").innerHTML = html;
}

function punchTile(card, front, back){
  if(punchesLeft <= 0 || card.classList.contains("flipped")) return;

  // fixed outcome: prize is chosen by punch order, not by the tile
  const prize = PRIZES[wonCount];

  back.innerHTML = `<div>${prize.grand ? "GRAND<br>PRIZE!" : prize.title}</div>`;

  punchesLeft--;
  wonCount++;
  updateScoreboard();
  front.classList.add("disabled");

  if(prize.grand){
    // hold the coin flip until she taps "Click to Reveal"
    grandCard = card;
    disableRemaining();
    setMessage("You won the grand prize! Happy Birthday!");
    showPrizeBanner(prize);
  } else {
    card.classList.add("flipped");
    fireConfetti();
    showPrizeBanner(prize);
    setMessage(`Nice pick! <b>${punchesLeft}</b> punch${punchesLeft === 1 ? "" : "es"} left.`);
  }
}

function disableRemaining(){
  document.querySelectorAll(".front:not(.disabled)").forEach(f => f.classList.add("disabled"));
}

function showPrizeBanner(prize){
  const banner = document.getElementById("prizeBanner");
  const kicker = document.getElementById("prizeKicker");
  const title  = document.getElementById("prizeTitle");
  const desc   = document.getElementById("prizeDesc");
  const btn    = document.getElementById("prizeBtn");

  const backdrop = document.getElementById("backdrop");
  banner.classList.remove("reveal-pop");

  if(prize.grand){
    // don't reveal what it is yet — build the suspense + darken the room
    grandPending = true;
    grandPrize = prize;
    kicker.textContent = "Congratulations!";
    title.textContent = "YOU PICKED THE GRAND PRIZE!";
    desc.style.display = "none";
    desc.textContent = "";
    btn.textContent = "Click to Reveal";
    btn.disabled = false;
    backdrop.classList.add("show");
  } else {
    grandPending = false;
    kicker.textContent = "You won";
    title.textContent = prize.title;
    desc.style.display = "none";
    desc.textContent = "";
    btn.textContent = "Continue";
    backdrop.classList.remove("show");
  }
  banner.classList.add("show");
}

document.getElementById("prizeBtn").addEventListener("click", () => {
  const banner = document.getElementById("prizeBanner");
  const btn = document.getElementById("prizeBtn");

  if(grandPending){
    grandPending = false;
    btn.disabled = true;

    fireworksShow(6500);                    // longer fireworks show

    // brief delay, then flip the coin
    setTimeout(() => {
      if(grandCard) grandCard.classList.add("flipped");
    }, 900);

    // a beat later, reveal the actual grand prize
    setTimeout(() => {
      document.getElementById("prizeKicker").textContent = "Your grand prize is";
      document.getElementById("prizeTitle").textContent = grandPrize.title;
      const desc = document.getElementById("prizeDesc");
      desc.style.display = "none";
      desc.textContent = "";
      banner.classList.add("reveal-pop");
      btn.textContent = "Continue";
      btn.disabled = false;
    }, 1700);
  } else {
    banner.classList.remove("show");
    document.getElementById("backdrop").classList.remove("show");
    fireworksStop();
  }
});

function themeColors(){
  const cs = getComputedStyle(document.body);
  return [
    cs.getPropertyValue("--accent").trim(),
    cs.getPropertyValue("--coin").trim(),
    cs.getPropertyValue("--frame").trim(),
    "#ffffff"
  ];
}

function fireConfetti(){
  if(typeof confetti !== "function") return;
  confetti({ particleCount: 130, spread: 90, origin: { y: 0.5 }, colors: themeColors() });
}

/* =========================================================
   Self-contained fireworks (no external library needed)
   ========================================================= */
const FW = {
  canvas:null, ctx:null, rockets:[], parts:[],
  raf:null, running:false, launchEnd:0, endTime:0, lastLaunch:0
};

function fwInit(){
  FW.canvas = document.getElementById("fireworksCanvas");
  FW.ctx = FW.canvas.getContext("2d");
  fwResize();
  window.addEventListener("resize", fwResize);
}
function fwResize(){
  if(!FW.canvas) return;
  FW.canvas.width = window.innerWidth;
  FW.canvas.height = window.innerHeight;
}
function fwPalette(){
  const cs = getComputedStyle(document.body);
  const c = k => cs.getPropertyValue(k).trim();
  return [c("--accent"), c("--coin"), c("--frame"), c("--pill-b"), c("--pill-a"), "#ffffff"]
         .filter(Boolean);
}
function fwPick(a){ return a[(Math.random()*a.length)|0]; }

function fwLaunch(){
  const c = FW.canvas;
  FW.rockets.push({
    x: c.width * (0.12 + Math.random()*0.76),
    y: c.height + 8,
    targetY: c.height * (0.10 + Math.random()*0.38),
    speed: 9 + Math.random()*3,
    color: fwPick(fwPalette())
  });
}
function fwExplode(x, y){
  const palette = fwPalette();
  const hue = fwPick(palette);
  const n = 110 + (Math.random()*70|0);      // denser bursts
  for(let i=0;i<n;i++){
    const ang = Math.random()*Math.PI*2;
    const spd = 2.5 + Math.random()*11;       // bigger spread
    FW.parts.push({
      x, y,
      vx: Math.cos(ang)*spd,
      vy: Math.sin(ang)*spd,
      life: 1,
      decay: 0.006 + Math.random()*0.010,
      size: 3.5 + Math.random()*2.5,          // bigger particles
      color: Math.random() < 0.75 ? hue : fwPick(palette)
    });
  }
}
function fwFrame(){
  const ctx = FW.ctx, c = FW.canvas;
  ctx.clearRect(0,0,c.width,c.height);
  ctx.globalCompositeOperation = "lighter";

  // keep launching while inside the launch window
  const now = Date.now();
  if(now < FW.launchEnd && now - FW.lastLaunch > 150){
    fwLaunch();
    fwLaunch();
    if(Math.random() < 0.6) fwLaunch();
    FW.lastLaunch = now;
  }

  // rockets
  for(let i=FW.rockets.length-1;i>=0;i--){
    const r = FW.rockets[i];
    r.y -= r.speed;
    ctx.globalAlpha = 1;
    ctx.fillStyle = r.color;
    ctx.beginPath();
    ctx.arc(r.x, r.y, 3.4, 0, Math.PI*2);
    ctx.fill();
    if(r.y <= r.targetY){
      fwExplode(r.x, r.y);
      FW.rockets.splice(i,1);
    }
  }

  // particles
  for(let i=FW.parts.length-1;i>=0;i--){
    const p = FW.parts[i];
    p.vx *= 0.985;
    p.vy *= 0.985;
    p.vy += 0.045;            // gravity
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    if(p.life <= 0){ FW.parts.splice(i,1); continue; }
    ctx.globalAlpha = Math.max(p.life, 0);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size*p.life + 1, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = "source-over";

  if(now < FW.endTime || FW.rockets.length || FW.parts.length){
    FW.raf = requestAnimationFrame(fwFrame);
  } else {
    ctx.clearRect(0,0,c.width,c.height);
    FW.running = false;
  }
}
function fireworksShow(durationMs){
  if(!FW.ctx) fwInit();
  fwResize();
  const dur = durationMs || 5000;
  FW.launchEnd = Date.now() + dur;   // keep launching this whole time
  FW.endTime = FW.launchEnd + 1800;  // let the last bursts fade out
  FW.lastLaunch = 0;
  // an opening volley
  for(let k=0;k<3;k++) setTimeout(fwLaunch, k*120);
  if(!FW.running){
    FW.running = true;
    FW.raf = requestAnimationFrame(fwFrame);
  }
}
function fireworksStop(){
  if(FW.raf) cancelAnimationFrame(FW.raf);
  FW.raf = null; FW.running = false;
  FW.rockets.length = 0; FW.parts.length = 0;
  if(FW.ctx) FW.ctx.clearRect(0,0,FW.canvas.width,FW.canvas.height);
}

function resetGame(){
  punchesLeft = NUM_PUNCHES;
  wonCount = 0;
  grandPending = false;
  grandPrize = null;
  grandCard = null;
  updateScoreboard();
  setMessage("Punch a slot and see what you win!");
  document.getElementById("prizeBanner").classList.remove("show", "reveal-pop");
  document.getElementById("backdrop").classList.remove("show");
  fireworksStop();
  buildBoard();
}

document.getElementById("resetBtn").addEventListener("click", resetGame);

// init
fwInit();
updateScoreboard();
buildBoard();
</script>
</body>
</html>
